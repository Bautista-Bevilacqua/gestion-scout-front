<dialog id="modal_confirmar_pago" class="modal">
  <div class="modal-box border-t-4 border-success max-w-2xl">
    <h3 class="font-bold text-2xl mb-4 text-center">Registrar Pago</h3>

    @if (cargo()) {
      <div class="bg-base-200 p-4 rounded-lg mb-6 text-center">
        <p class="text-sm opacity-70">Estás cobrando:</p>
        <p class="text-xl font-bold">{{ cargo()?.concepto_nombre }}</p>
      </div>

      <p class="font-bold mb-3 text-center text-lg">Seleccioná el método de pago:</p>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <button
          class="btn btn-outline btn-success flex flex-col h-auto py-4 gap-1"
          [disabled]="procesando()"
          (click)="confirmar('EFECTIVO')"
        >
          <span class="text-3xl">💵</span>
          <span class="text-sm uppercase font-bold">Efectivo</span>
          <span class="text-2xl font-black">${{ cargo()?.monto_efectivo }}</span>
        </button>

        <button
          class="btn btn-outline btn-info flex flex-col h-auto py-4 gap-1"
          [disabled]="procesando()"
          (click)="confirmar('MERCADOPAGO')"
        >
          <span class="text-3xl">📱</span>
          <span class="text-sm uppercase font-bold">Mercado Pago</span>
          <span class="text-2xl font-black">${{ cargo()?.monto_transferencia }}</span>
        </button>

        <button
          class="btn btn-outline btn-warning flex flex-col h-auto py-4 gap-1"
          [disabled]="procesando()"
          (click)="confirmar('TRANSFERENCIA')"
        >
          <span class="text-3xl">🏦</span>
          <span class="text-sm uppercase font-bold">Transferencia</span>
          <span class="text-2xl font-black">${{ cargo()?.monto_transferencia }}</span>
        </button>
      </div>
    }

    <div class="modal-action mt-6">
      <button class="btn btn-ghost" (click)="cerrar()" [disabled]="procesando()">Cancelar</button>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button (click)="cerrar()">close</button></form>
</dialog>
