<div class="p-6 md:p-10 bg-base-200 min-h-screen relative">
  <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
    <h1 class="text-3xl font-bold text-base-content capitalize">
      {{ ramaSeleccionada() ? 'Rama ' + ramaSeleccionada() : 'Nómina de Beneficiarios' }}
    </h1>
    <div class="flex gap-2">
      <button class="btn btn-ghost" (click)="cargarBeneficiarios(true)">↻ Refrescar</button>
      @if (isAdmin()) {
        <button routerLink="/beneficiarios/nuevo" class="btn btn-primary">
          Nuevo Beneficiario
        </button>
      }
    </div>
  </div>

  <div class="flex flex-col gap-2 mb-6">
    <div class="relative w-full md:w-1/3">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <span class="text-xl opacity-50">🔍</span>
      </div>
      <input
        type="text"
        placeholder="Buscar por nombre, DNI o rama..."
        class="input input-bordered w-full pl-10 bg-base-100 shadow-sm"
        [value]="searchTerm()"
        (input)="onSearch($event)"
      />
    </div>

    @if (searchTerm()) {
      <div class="text-xs animate-in fade-in slide-in-from-left-2 duration-200">
        <span class="badge badge-ghost gap-2 italic">
          Resultados encontrados: <strong>{{ beneficiariosFiltrados().length }}</strong>
        </span>
      </div>
    }
  </div>

  @if (cargando()) {
    <app-loading-spinner texto="Cargando nómina..."></app-loading-spinner>
  } @else if (error()) {
    <div class="flex flex-col gap-4">
      <app-alert-error [mensaje]="error()" (cerrar)="limpiarError()"></app-alert-error>
      <button class="btn btn-outline self-center" (click)="cargarBeneficiarios()">
        Reintentar carga
      </button>
    </div>
  } @else {
    <app-tabla-beneficiarios
      [beneficiarios]="beneficiariosFiltrados()"
      (onEliminar)="prepararBorrado($event)"
    >
    </app-tabla-beneficiarios>
  }

  <app-confirm-modal
    modalId="modal_confirmar_borrado"
    titulo="¿Confirmar eliminación?"
    [mensaje]="
      'Estás por borrar a <strong>' +
      beneficiarioSeleccionado()?.nombre +
      ' ' +
      beneficiarioSeleccionado()?.apellido +
      '</strong>. Esta acción es permanente.'
    "
    textoBoton="Eliminar definitivamente"
    (confirmar)="confirmarBorrado()"
  >
  </app-confirm-modal>
</div>
