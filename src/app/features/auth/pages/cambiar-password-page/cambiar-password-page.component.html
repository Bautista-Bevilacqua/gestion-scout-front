<div class="min-h-screen bg-base-200 flex items-center justify-center p-4">
  <div class="card w-full max-w-lg bg-base-100 shadow-xl border-t-4 border-warning">
    <div class="card-body p-8">
      <div class="text-center mb-8">
        <div class="bg-warning/20 text-warning inline-block p-4 rounded-full mb-4">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-10 w-10"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
            />
          </svg>
        </div>
        <h2 class="text-3xl font-black text-base-content">Cambio Obligatorio</h2>
        <p class="text-base-content/60 mt-3 text-lg">
          Por seguridad, debés definir una contraseña propia antes de ingresar al sistema.
        </p>
      </div>

      @if (errorMsg()) {
        <div class="alert alert-error mb-4 text-base">
          <span>{{ errorMsg() }}</span>
        </div>
      }

      <form [formGroup]="passForm" (ngSubmit)="guardar()" class="flex flex-col gap-6">
        <label class="form-control w-full">
          <div class="label pb-2">
            <span class="label-text font-bold text-lg">Nueva Contraseña</span>
          </div>
          <input
            type="password"
            formControlName="nueva"
            class="input input-bordered input-lg w-full focus:input-primary transition-colors text-lg"
            placeholder="Mínimo 6 caracteres"
          />
        </label>

        <label class="form-control w-full">
          <div class="label pb-2">
            <span class="label-text font-bold text-lg">Confirmar Contraseña</span>
          </div>
          <input
            type="password"
            formControlName="confirmacion"
            class="input input-bordered input-lg w-full focus:input-primary transition-colors text-lg"
            placeholder="Repetí la contraseña"
          />
        </label>

        <button
          type="submit"
          class="btn btn-primary btn-lg mt-6 w-full text-xl"
          [disabled]="passForm.invalid || guardando()"
        >
          @if (guardando()) {
            <span class="loading loading-spinner loading-md"></span>
            Actualizando...
          } @else {
            Guardar y Entrar
          }
        </button>
      </form>
    </div>
  </div>
</div>
