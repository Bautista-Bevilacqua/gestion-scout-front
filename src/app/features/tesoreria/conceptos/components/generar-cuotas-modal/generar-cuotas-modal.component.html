<dialog id="modal_generar_cuotas" class="modal">
  <div class="modal-box max-w-2xl">
    <h3 class="font-bold text-2xl mb-4">Generador Masivo de Cuotas</h3>

    @if (errorMsg()) {
      <div class="alert alert-error shadow-sm mb-6 text-sm font-semibold">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="stroke-current shrink-0 h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
        <span>{{ errorMsg() }}</span>
      </div>
    }

    <form
      [formGroup]="cuotasForm"
      (ngSubmit)="guardar()"
      class="grid grid-cols-1 md:grid-cols-2 gap-6"
    >
      <div class="md:col-span-2">
        <label class="label font-bold">Meses a generar:</label>
        <div class="grid grid-cols-3 sm:grid-cols-4 gap-2 bg-base-200 p-4 rounded-xl">
          @for (mes of listaMeses; track mes) {
            <label
              class="flex items-center gap-2 cursor-pointer hover:bg-base-300 p-1 rounded transition-colors"
            >
              <input
                type="checkbox"
                class="checkbox checkbox-sm checkbox-primary"
                (change)="onMesChange(mes, $event)"
              />
              <span class="text-sm">{{ mes }}</span>
            </label>
          }
        </div>
      </div>

      <label class="form-control">
        <div class="label"><span class="label-text font-bold">Año</span></div>
        <input type="number" formControlName="anio" class="input input-bordered" />
      </label>

      <label class="form-control">
        <div class="label">
          <span class="label-text font-bold">Fecha de Vencimiento de estas cuotas</span>
        </div>
        <input
          type="date"
          formControlName="fecha_vencimiento"
          class="input input-bordered w-full"
        />
      </label>

      <div class="grid grid-cols-2 gap-4">
        <label class="form-control">
          <div class="label"><span class="label-text font-bold">Efectivo ($)</span></div>
          <input
            type="number"
            formControlName="monto_efectivo"
            class="input input-bordered"
            placeholder="Ej: 5000"
          />
        </label>
        <label class="form-control">
          <div class="label"><span class="label-text font-bold">MP / Transf. ($)</span></div>
          <input
            type="number"
            formControlName="monto_transferencia"
            class="input input-bordered"
            placeholder="Ej: 5500"
          />
        </label>
      </div>

      <div class="md:col-span-2 modal-action">
        <button type="button" class="btn" (click)="cerrar()">Cancelar</button>
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="cuotasForm.invalid || guardando()"
        >
          {{ guardando() ? 'Generando...' : 'Crear todas las cuotas' }}
        </button>
      </div>
    </form>
  </div>
</dialog>
